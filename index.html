<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>だまし絵マスター - 匿名サークル＆BAN機能版</title>
    <style>
        :root { --primary: #FF6B6B; --secondary: #4ECDC4; --accent: #FFE66D; --dark: #2C3E50; --light: #F7FFF7; --bg: #E8F8F5; }
        body { font-family: 'Hiragino Maru Gothic ProN', sans-serif; background-color: var(--bg); color: var(--dark); margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 600px; background: var(--light); min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .screen { display: none; flex-direction: column; align-items: center; padding: 20px; flex-grow: 1; box-sizing: border-box; width: 100%; }
        .screen.active { display: flex; }
        h1 { color: var(--primary); font-size: 2em; text-align: center; text-shadow: 2px 2px 0px var(--accent); margin: 10px 0; }
        button { background-color: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 30px; font-size: 1.1em; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #C0392B; margin: 10px; width: 85%; transition: 0.1s; }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #C0392B; }
        button:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        .btn-ban { background: #e74c3c; box-shadow: 0 3px 0 #c0392b; font-size: 0.7em; padding: 5px 10px; width: auto; margin-left: 10px; }
        input[type="text"] { width: 85%; padding: 12px; font-size: 1.1em; border: 3px solid #ddd; border-radius: 10px; text-align: center; margin-bottom: 10px; }
        .canvas-container { width: 100%; background: white; border: 4px solid var(--dark); border-radius: 15px; overflow: hidden; position: relative; aspect-ratio: 4 / 3; touch-action: none; }
        canvas { display: block; width: 100%; height: 100%; }
        #canvas-blocker { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 100; background: rgba(255,255,255,0); }
        .player-list { width: 100%; list-style: none; padding: 0; }
        .player-item { background: white; margin: 5px 0; padding: 10px; border-radius: 10px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .status-bar { width: 100%; background: var(--dark); color: white; padding: 10px; display: flex; justify-content: space-between; font-size: 0.9em; box-sizing: border-box; }
        .result-image { width: 100%; max-width: 400px; border: 4px solid var(--dark); border-radius: 10px; margin-top: 10px; }
        #answers-log { width: 100%; background: white; padding: 10px; border-radius: 10px; margin: 15px 0; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-title" class="screen active">
        <h1>だまし絵マスター</h1>
        <input type="text" id="my-name" placeholder="なまえを入力" maxlength="10">
        <button onclick="enterCircle()" style="background: var(--accent); color: var(--dark); box-shadow: 0 5px 0 #D4AC0D;">匿名サークルに入る</button>
        <div style="margin: 10px 0; color: #999;">または</div>
        <input type="text" id="join-room-id" placeholder="合言葉を入力" style="text-transform: uppercase;">
        <button onclick="joinRoom()" style="background: var(--secondary); box-shadow: 0 5px 0 #16A085;">部屋に入る</button>
        <button onclick="createRoom()" style="background: #999; font-size: 0.8em; box-shadow: 0 4px 0 #666;">自分で部屋を作る</button>
    </div>

    <div id="screen-lobby" class="screen">
        <h2 id="lobby-title">待合室</h2>
        <ul class="player-list" id="lobby-players"></ul>
        <button id="btn-start-game" onclick="startGame()" style="display: none;">ゲーム開始！</button>
        <p id="waiting-host-msg">ホストの開始を待っています...</p>
    </div>

    <div id="screen-prompt" class="screen">
        <h2 id="round-info">Round 1</h2>
        <h3 id="turn-player-name">---</h3>
        <div id="drawer-prompt-view" style="display: none; text-align: center;">
            <p>あなたへのお題：</p>
            <div id="secret-prompt" style="font-size: 2.2em; font-weight: bold; background: var(--accent); padding: 15px; border-radius: 15px; margin: 10px 0;"></div>
            <button onclick="advanceState('drawing')" id="btn-start-drawing">描きはじめる</button>
        </div>
        <div id="guesser-prompt-view" style="display: none;"><p>描き手がお題を確認しています...</p></div>
    </div>

    <div id="screen-drawing" class="screen" style="padding: 0;">
        <div class="status-bar">
            <div id="drawing-status-text">待機中...</div>
            <div id="drawing-timer" style="color: var(--accent); font-weight: bold; font-size: 1.2em;">60</div>
        </div>
        <div class="canvas-container">
            <canvas id="drawing-canvas" width="600" height="450"></canvas>
            <div id="canvas-blocker"></div>
        </div>
        <div id="drawing-tools" style="display: flex; gap: 15px; margin: 10px;">
            <div style="background:#000; width:35px; height:35px; border-radius:50%;" onclick="setColor('#000')"></div>
            <div style="background:#f00; width:35px; height:35px; border-radius:50%;" onclick="setColor('#f00')"></div>
            <button onclick="clearCanvas()" style="width: auto; padding: 5px 15px; font-size: 0.9em; margin:0;">全消し</button>
        </div>
        <button id="btn-finish-drawing" onclick="finishDrawing()">描けた！</button>
    </div>

    <div id="screen-guessing" class="screen">
        <h2>これ、なーんだ？</h2>
        <img id="guess-image-display" class="result-image">
        <div id="guess-input-area" style="width: 100%; text-align: center; margin-top: 15px;">
            <input type="text" id="guess-input" placeholder="答えを入力">
            <button onclick="submitGuess()">回答する</button>
        </div>
        <div id="guess-wait-msg" style="display:none;"><p>他の人の回答を待っています...</p></div>
    </div>

    <div id="screen-result" class="screen">
        <h2>正解は「<span id="result-prompt" style="color: var(--primary);"></span>」</h2>
        <img id="result-image-display-2" class="result-image">
        <div id="answers-log">
            <h3 style="margin: 0 0 10px 0; font-size: 1em;">みんなの回答</h3>
            <ul id="answers-list" style="padding:0; list-style:none;"></ul>
        </div>
        <button id="btn-next-round" onclick="nextRound()" style="display: none;">次のラウンドへ</button>
        <p id="wait-next-msg">ホストの操作を待っています...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, child, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
      apiKey: "AIzaSyACEPLiM3hhj2uQoxg-kJt1RF2zmfE6Uqg",
      authDomain: "basashi-c1588.firebaseapp.com",
      databaseURL: "https://basashi-c1588-default-rtdb.firebaseio.com",
      projectId: "basashi-c1588",
      storageBucket: "basashi-c1588.firebasestorage.app",
      messagingSenderId: "622463342057",
      appId: "1:622463342057:web:c39e37aa232c30187ce778",
      measurementId: "G-S08L2GVZPV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myUid = localStorage.getItem('damashie_uid') || Math.random().toString(36).substring(2, 10);
    localStorage.setItem('damashie_uid', myUid);
    let myName = "", roomId = "", isHost = false, roomRef = null, roomState = {};
    const PROMPT_LIST = ["ねこ", "かさ", "ピザ", "かき氷", "にわとり", "ドーナツ", "めがね", "ロケット", "パンダ", "さくらんぼ", "おにぎり"];

    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false, currentColor = '#000';

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- 部屋管理 ---
    window.enterCircle = () => { roomId = "PUBLIC"; joinOrCreate(); };
    window.createRoom = () => { roomId = Math.random().toString(36).substring(2, 6).toUpperCase(); joinOrCreate(true); };
    window.joinRoom = () => { roomId = document.getElementById('join-room-id').value.toUpperCase(); joinOrCreate(); };

    async function joinOrCreate(forceHost = false) {
        myName = document.getElementById('my-name').value || "ゲスト";
        roomRef = ref(db, `rooms/${roomId}`);
        const snap = await get(roomRef);
        
        if (!snap.exists() || forceHost) {
            isHost = true;
            await set(roomRef, {
                state: "lobby", hostUid: myUid, round: 1, drawerIndex: 0,
                players: { [myUid]: { name: myName, score: 0, order: Date.now() } }
            });
        } else {
            if (snap.val().banList && snap.val().banList[myUid]) return alert("BANされています");
            await update(child(roomRef, 'players'), { [myUid]: { name: myName, score: 0, order: Date.now() } });
        }
        initListener();
    }

    window.banPlayer = (uid) => {
        if (confirm("この人を追放しますか？")) {
            update(child(roomRef, 'banList'), { [uid]: true });
            remove(child(roomRef, `players/${uid}`));
        }
    };

    function initListener() {
        onValue(roomRef, (snap) => {
            const data = snap.val(); if (!data) return;
            roomState = data;
            if (data.banList && data.banList[myUid]) { alert("BANされました"); location.reload(); return; }
            
            const playerKeys = Object.keys(data.players || {}).sort((a,b) => data.players[a].order - data.players[b].order);
            const currentDrawerUid = playerKeys[data.drawerIndex];
            const isMeDrawer = (myUid === currentDrawerUid);
            isHost = (data.hostUid === myUid);

            if (data.state === "lobby") {
                switchScreen('screen-lobby');
                document.getElementById('lobby-title').innerText = (roomId === "PUBLIC") ? "匿名サークル" : `部屋ID: ${roomId}`;
                document.getElementById('lobby-players').innerHTML = playerKeys.map(k => {
                    const banBtn = (isHost && k !== myUid) ? `<button class="btn-ban" onclick="banPlayer('${k}')">BAN</button>` : "";
                    return `<li class="player-item">${data.players[k].name}${banBtn}</li>`;
                }).join('');
                document.getElementById('btn-start-game').style.display = isHost ? 'block' : 'none';
                document.getElementById('waiting-host-msg').style.display = isHost ? 'none' : 'block';
            }

            if (data.state === "prompt") {
                switchScreen('screen-prompt');
                document.getElementById('round-info').innerText = `Round ${data.round}`;
                document.getElementById('turn-player-name').innerText = `${data.players[currentDrawerUid]?.name}さんの番`;
                if (isMeDrawer) {
                    document.getElementById('drawer-prompt-view').style.display = 'block';
                    document.getElementById('guesser-prompt-view').style.display = 'none';
                    document.getElementById('secret-prompt').innerText = data.currentPrompt;
                } else {
                    document.getElementById('drawer-prompt-view').style.display = 'none';
                    document.getElementById('guesser-prompt-view').style.display = 'block';
                }
            }

            if (data.state === "drawing") {
                switchScreen('screen-drawing');
                document.getElementById('drawing-timer').innerText = data.timeLeft;
                if (isMeDrawer) {
                    document.getElementById('drawing-tools').style.display = 'flex';
                    document.getElementById('btn-finish-drawing').style.display = 'block';
                    document.getElementById('canvas-blocker').style.display = 'none';
                    document.getElementById('drawing-status-text').innerText = `お題: ${data.currentPrompt}`;
                } else {
                    document.getElementById('drawing-tools').style.display = 'none';
                    document.getElementById('btn-finish-drawing').style.display = 'none';
                    document.getElementById('canvas-blocker').style.display = 'block';
                    document.getElementById('drawing-status-text').innerText = `${data.players[currentDrawerUid]?.name}が描き中...`;
                    if (data.canvasData) {
                        const img = new Image();
                        img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
                        img.src = data.canvasData;
                    }
                }
            }

            if (data.state === "guessing") {
                switchScreen('screen-guessing');
                document.getElementById('guess-image-display').src = data.canvasData;
                const alreadyGuessed = data.guesses && data.guesses[myUid];
                document.getElementById('guess-input-area').style.display = (isMeDrawer || alreadyGuessed) ? 'none' : 'block';
                document.getElementById('guess-wait-msg').style.display = (isMeDrawer || alreadyGuessed) ? 'block' : 'none';
                if (isHost && data.guesses && Object.keys(data.guesses).length >= playerKeys.length - 1) {
                    calcResult(data, playerKeys, currentDrawerUid);
                }
            }

            if (data.state === "result") {
                switchScreen('screen-result');
                document.getElementById('result-prompt').innerText = data.currentPrompt;
                document.getElementById('result-image-display-2').src = data.canvasData;
                const gs = data.guesses || {};
                document.getElementById('answers-list').innerHTML = Object.keys(gs).map(k => `<li>${data.players[k]?.name}: ${gs[k].text} ${gs[k].correct ? "✅" : "❌"}</li>`).join('');
                document.getElementById('btn-next-round').style.display = isHost ? 'block' : 'none';
                document.getElementById('wait-next-msg').style.display = isHost ? 'none' : 'block';
            }
        });
    }

    // --- ゲームアクション ---
    window.startGame = () => update(roomRef, { state: "prompt", currentPrompt: PROMPT_LIST[Math.floor(Math.random()*PROMPT_LIST.length)] });
    
    window.advanceState = (s) => {
        update(roomRef, { state: s });
        if (s === "drawing") {
            ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0,0,canvas.width,canvas.height); syncCanvas();
            let t = 60;
            const timer = setInterval(() => {
                if (roomState.state !== "drawing") { clearInterval(timer); return; }
                t--; update(roomRef, { timeLeft: t });
                if (t <= 0) { clearInterval(timer); update(roomRef, { state: "guessing" }); }
            }, 1000);
        }
    };

    window.finishDrawing = () => update(roomRef, { state: "guessing" });

    window.submitGuess = () => {
        const val = document.getElementById('guess-input').value.trim();
        if(!val) return;
        update(child(roomRef, `guesses/${myUid}`), { text: val, correct: (val === roomState.currentPrompt) });
        document.getElementById('guess-input').value = "";
    };

    function calcResult(data, keys, drawerUid) {
        let up = { state: "result" };
        update(roomRef, up);
    }

    window.nextRound = () => {
        const keys = Object.keys(roomState.players).sort((a,b) => roomState.players[a].order - roomState.players[b].order);
        let next = roomState.drawerIndex + 1;
        if (next >= keys.length) update(roomRef, { state: "lobby", drawerIndex: 0, guesses: null, canvasData: "" });
        else update(roomRef, { state: "prompt", drawerIndex: next, round: roomState.round + 1, currentPrompt: PROMPT_LIST[Math.floor(Math.random()*PROMPT_LIST.length)], guesses: null, canvasData: "" });
    };

    // --- お絵かきロジック ---
    function syncCanvas() { if(roomState.state === "drawing") update(roomRef, { canvasData: canvas.toDataURL('image/jpeg', 0.5) }); }
    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
        return { x: x * (canvas.width / r.width), y: y * (canvas.height / r.height) };
    }
    const startDraw = (e) => {
        const playerKeys = Object.keys(roomState.players).sort((a,b) => roomState.players[a].order - roomState.players[b].order);
        if (roomState.state !== "drawing" || myUid !== playerKeys[roomState.drawerIndex]) return;
        isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y);
    };
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
    window.addEventListener('mousemove', (e) => {
        if (!isDrawing) return; const p = getPos(e);
        ctx.lineTo(p.x, p.y); ctx.strokeStyle = currentColor; ctx.lineWidth = 5; ctx.lineCap = "round"; ctx.stroke();
        if (Math.random() > 0.8) syncCanvas();
    });
    window.addEventListener('touchmove', (e) => {
        if (!isDrawing) return; const p = getPos(e);
        ctx.lineTo(p.x, p.y); ctx.strokeStyle = currentColor; ctx.lineWidth = 5; ctx.lineCap = "round"; ctx.stroke();
        if (Math.random() > 0.8) syncCanvas();
    }, {passive: false});
    window.addEventListener('mouseup', () => { if(isDrawing){ isDrawing = false; syncCanvas(); } });
    window.addEventListener('touchend', () => { if(isDrawing){ isDrawing = false; syncCanvas(); } });
    window.setColor = (c) => currentColor = c;
    window.clearCanvas = () => { ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0,0,canvas.width,canvas.height); syncCanvas(); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>だまし絵マスター - スマホ対応版</title>
    <style>
        :root { --primary: #FF6B6B; --secondary: #4ECDC4; --accent: #FFE66D; --dark: #2C3E50; --light: #F7FFF7; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: sans-serif; background: #E8F8F5; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 500px; background: var(--light); display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* 画面切り替え */
        .screen { display: none; flex-direction: column; align-items: center; padding: 20px; width: 100%; flex-grow: 1; }
        .screen.active { display: flex; }

        /* スマホ向けボタン：z-indexを高く設定 */
        button { 
            background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px;
            font-size: 1.1em; font-weight: bold; width: 90%; margin: 10px 0; cursor: pointer;
            box-shadow: 0 4px 0 #C0392B; position: relative; z-index: 100; /* 常に最前面 */
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #C0392B; }
        
        input { width: 90%; padding: 12px; font-size: 1.1em; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 10px; text-align: center; }

        /* キャンバスエリア */
        .canvas-area { width: 100%; position: relative; aspect-ratio: 4 / 3; background: #fff; border: 3px solid var(--dark); border-radius: 10px; overflow: hidden; touch-action: none; }
        canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
        
        /* 透明なガード：z-indexをボタンより低く設定 */
        #canvas-blocker { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; display: none; background: rgba(255,255,255,0.01); }

        .status-bar { width: 100%; background: var(--dark); color: white; padding: 10px; display: flex; justify-content: space-between; font-weight: bold; }
        .tools { display: flex; gap: 15px; margin: 15px 0; z-index: 100; }
        .color-btn { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #ddd; }
        
        /* リスト表示 */
        #answers-log { width: 90%; background: #fff; border-radius: 10px; padding: 10px; margin-top: 10px; }
        .player-list { list-style: none; padding: 0; font-size: 1.2em; }
        .result-img { width: 100%; border-radius: 10px; border: 2px solid var(--dark); margin: 10px 0; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-title" class="screen active">
        <h1>だまし絵マスター</h1>
        <input type="text" id="user-name" placeholder="なまえ">
        <button onclick="createRoom()">部屋を作る</button>
        <input type="text" id="room-input" placeholder="合言葉">
        <button onclick="joinRoom()" style="background: var(--secondary); box-shadow: 0 4px 0 #16A085;">部屋に入る</button>
    </div>

    <div id="screen-lobby" class="screen">
        <h2>合言葉: <span id="room-id-tag" style="color:var(--primary)">----</span></h2>
        <ul id="member-list" class="player-list"></ul>
        <button id="start-btn" onclick="startGame()" style="display:none">ゲーム開始</button>
    </div>

    <div id="screen-prompt" class="screen">
        <h2 id="round-title">Round 1</h2>
        <div id="prompt-box" style="display:none; text-align:center">
            <p>あなたへのお題</p>
            <h1 id="target-word" style="background:var(--accent); padding:10px">---</h1>
            <button onclick="goDrawing()">描きはじめる</button>
        </div>
        <div id="wait-box"><p>描き手が確認中です...</p></div>
    </div>

    <div id="screen-drawing" class="screen" style="padding:0">
        <div class="status-bar">
            <span id="role-text">お題: ---</span>
            <span id="timer-text">60</span>
        </div>
        <div class="canvas-area">
            <canvas id="main-canvas" width="400" height="300"></canvas>
            <div id="canvas-blocker"></div>
        </div>
        <div id="draw-ui" class="tools" style="display:none">
            <div class="color-btn" style="background:#000" onclick="setColor('#000')"></div>
            <div class="color-btn" style="background:#f00" onclick="setColor('#f00')"></div>
            <button onclick="clearCanvas()" style="width:80px; padding:10px; margin:0">消去</button>
        </div>
        <button id="finish-btn" onclick="goGuessing()" style="display:none">描けた！</button>
    </div>

    <div id="screen-guessing" class="screen">
        <h2>これ、なーんだ？</h2>
        <img id="display-img" class="result-img">
        <div id="input-ui">
            <input type="text" id="answer-input" placeholder="答えは？">
            <button onclick="sendAnswer()">送信</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h2 id="correct-ans">正解は ---</h2>
        <img id="result-img-final" class="result-img">
        <div id="answers-log"><h3>みんなの回答</h3><ul id="log-list"></ul></div>
        <button id="next-btn" onclick="goNextRound()" style="display:none">次へ</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let myId = Math.random().toString(36).slice(2, 10);
    let roomPath = null, isHost = false, roomData = null;

    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false, color = '#000';

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- 部屋管理 ---
    window.createRoom = async () => {
        const name = document.getElementById('user-name').value || "ゲスト";
        const rid = Math.random().toString(36).slice(2, 6).toUpperCase();
        isHost = true;
        roomPath = ref(db, `rooms/${rid}`);
        await set(roomPath, {
            state: 'lobby', host: myId, round: 1, drawerIdx: 0,
            players: { [myId]: { name, score: 0, order: 0 } }
        });
        listen(); show('screen-lobby');
    };

    window.joinRoom = async () => {
        const rid = document.getElementById('room-input').value.toUpperCase();
        const name = document.getElementById('user-name').value || "ゲスト";
        roomPath = ref(db, `rooms/${rid}`);
        const snap = await get(roomPath);
        if(!snap.exists()) return alert("部屋がないよ");
        const order = Object.keys(snap.val().players).length;
        await update(ref(db, `rooms/${rid}/players/${myId}`), { name, score: 0, order });
        listen(); show('screen-lobby');
    };

    function listen() {
        onValue(roomPath, (snap) => {
            const data = snap.val(); if(!data) return;
            roomData = data;
            const pKeys = Object.keys(data.players).sort((a,b) => data.players[a].order - data.players[b].order);
            const drawerId = pKeys[data.drawerIdx];
            const amIDrawer = (myId === drawerId);

            if(data.state === 'lobby') {
                document.getElementById('room-id-tag').innerText = snap.key;
                document.getElementById('member-list').innerHTML = pKeys.map(k => `<li>${data.players[k].name}</li>`).join('');
                if(isHost) document.getElementById('start-btn').style.display = 'block';
            }

            if(data.state === 'prompt') {
                show('screen-prompt');
                document.getElementById('round-title').innerText = `Round ${data.round}`;
                if(amIDrawer) {
                    document.getElementById('prompt-box').style.display = 'block';
                    document.getElementById('wait-box').style.display = 'none';
                    document.getElementById('target-word').innerText = data.word;
                } else {
                    document.getElementById('prompt-box').style.display = 'none';
                    document.getElementById('wait-box').style.display = 'block';
                }
            }

            if(data.state === 'drawing') {
                show('screen-drawing');
                document.getElementById('timer-text').innerText = data.timer;
                if(amIDrawer) {
                    document.getElementById('draw-ui').style.display = 'flex';
                    document.getElementById('finish-btn').style.display = 'block';
                    document.getElementById('canvas-blocker').style.display = 'none';
                    document.getElementById('role-text').innerText = `お題: ${data.word}`;
                } else {
                    document.getElementById('draw-ui').style.display = 'none';
                    document.getElementById('finish-btn').style.display = 'none';
                    document.getElementById('canvas-blocker').style.display = 'block';
                    document.getElementById('role-text').innerText = `${data.players[drawerId].name}が描画中`;
                    if(data.img) {
                        const i = new Image();
                        i.onload = () => { ctx.clearRect(0,0,400,300); ctx.drawImage(i,0,0); };
                        i.src = data.img;
                    }
                }
            }

            if(data.state === 'guessing') {
                show('screen-guessing');
                document.getElementById('display-img').src = data.img;
                const hasAnswered = data.answers && data.answers[myId];
                document.getElementById('input-ui').style.display = (amIDrawer || hasAnswered) ? 'none' : 'block';
                if(isHost && data.answers && Object.keys(data.answers).length >= pKeys.length - 1) {
                    setTimeout(() => finishRound(data, pKeys, drawerId), 1000);
                }
            }

            if(data.state === 'result') {
                show('screen-result');
                document.getElementById('correct-ans').innerText = `正解は「${data.word}」`;
                document.getElementById('result-img-final').src = data.img;
                const list = document.getElementById('log-list');
                list.innerHTML = Object.keys(data.answers || {}).map(k => {
                    const a = data.answers[k];
                    return `<li>${data.players[k].name}: ${a.text} ${a.ok ? '✅':'❌'}</li>`;
                }).join('');
                if(isHost) document.getElementById('next-btn').style.display = 'block';
            }
        });
    }

    // --- ゲーム進行 ---
    const WORDS = ["ねこ","くるま","バナナ","テレビ","すいか","めがね","さかな"];
    window.startGame = () => update(roomPath, { state: 'prompt', word: WORDS[Math.floor(Math.random()*WORDS.length)] });
    
    window.goDrawing = () => {
        update(roomPath, { state: 'drawing', timer: 60 });
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,400,300);
        let t = 60;
        const iv = setInterval(() => {
            t--; update(roomPath, { timer: t });
            if(t <= 0 || roomData.state !== 'drawing') { clearInterval(iv); if(t<=0) goGuessing(); }
        }, 1000);
    };

    window.goGuessing = () => update(roomPath, { state: 'guessing' });

    window.sendAnswer = () => {
        const text = document.getElementById('answer-input').value;
        if(!text) return;
        update(ref(db, `rooms/${roomData.id}/answers/${myId}`), { 
            text, ok: (text === roomData.word) 
        });
        document.getElementById('answer-input').value = "";
    };

    function finishRound(data, keys, dId) {
        update(roomPath, { state: 'result' });
    }

    window.goNextRound = () => {
        const keys = Object.keys(roomData.players);
        let next = roomData.drawerIdx + 1;
        if(next >= keys.length) location.reload();
        else update(roomPath, { 
            state: 'prompt', drawerIdx: next, round: roomData.round + 1, 
            word: WORDS[Math.floor(Math.random()*WORDS.length)], answers: null, img: "" 
        });
    };

    // --- お絵かき同期 (スマホ対応) ---
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const ev = e.touches ? e.touches[0] : e;
        return {
            x: (ev.clientX - rect.left) * (canvas.width / rect.width),
            y: (ev.clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    function start(e) {
        if(roomData?.state !== 'drawing' || myId !== Object.keys(roomData.players).sort((a,b)=>roomData.players[a].order-roomData.players[b].order)[roomData.drawerIdx]) return;
        drawing = true;
        const p = getPos(e);
        ctx.beginPath(); ctx.moveTo(p.x, p.y);
    }

    function move(e) {
        if(!drawing) return;
        const p = getPos(e);
        ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.stroke();
        if(Math.random() > 0.8) update(roomPath, { img: canvas.toDataURL('image/jpeg', 0.5) });
    }

    function end() { if(drawing) { drawing = false; update(roomPath, { img: canvas.toDataURL('image/jpeg', 0.5) }); } }

    canvas.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); });
    canvas.addEventListener('touchend', end);

    window.setColor = (c) => color = c;
    window.clearCanvas = () => { ctx.fillStyle = '#fff'; ctx.fillRect(0,0,400,300); end(); };
</script>
</body>
</html>

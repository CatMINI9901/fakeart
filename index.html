<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MediaPipe Face Tracking Mobile</title>
    <style>
        /* 全画面リセット */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* 映像コンテナ */
        .view-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ビデオとキャンバスを重ねる */
        video, canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 画面いっぱいに広げる */
            transform: scaleX(-1); /* 自撮り用に反転 */
        }

        /* 操作UI */
        .ui-panel {
            position: absolute;
            bottom: 40px;
            z-index: 100;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        button {
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        button:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 1);
        }

        button:disabled {
            background: #666;
            color: #aaa;
        }

        #status {
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            font-size: 14px;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="view-container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <div class="ui-panel">
        <div id="status">ライブラリ読み込み中...</div>
        <button id="webcamButton" disabled>カメラを起動</button>
    </div>
</div>

<script type="module">
    import { FaceLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

    const video = document.getElementById('webcam');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const webcamButton = document.getElementById('webcamButton');
    const statusDisplay = document.getElementById('status');

    let faceLandmarker;
    let runningMode = "VIDEO";
    let webcamRunning = false;

    // 1. モデルの初期化
    async function init() {
        try {
            const filesetResolver = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                    delegate: "GPU"
                },
                outputFaceBlendshapes: false,
                runningMode: runningMode,
                numFaces: 1
            });
            
            statusDisplay.innerText = "準備完了";
            webcamButton.disabled = false;
        } catch (e) {
            statusDisplay.innerText = "エラー: " + e;
        }
    }
    init();

    // 2. カメラ起動
    async function toggleCamera() {
        if (webcamRunning) {
            webcamRunning = false;
            webcamButton.innerText = "カメラを起動";
            const stream = video.srcObject;
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            return;
        }

        webcamRunning = true;
        webcamButton.innerText = "カメラを停止";

        const constraints = {
            video: {
                facingMode: "user", // インカメラ優先
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            video.addEventListener('loadeddata', () => {
                canvasElement.width = video.videoWidth;
                canvasElement.height = video.videoHeight;
                renderLoop();
            });
        } catch (err) {
            alert("カメラにアクセスできません: " + err);
            webcamRunning = false;
            webcamButton.innerText = "カメラを起動";
        }
    }

    webcamButton.addEventListener('click', toggleCamera);

    // 3. 描画ループ
    const drawingUtils = new DrawingUtils(canvasCtx);
    let lastVideoTime = -1;

    async function renderLoop() {
        if (!webcamRunning) return;

        if (video.currentTime !== lastVideoTime) {
            lastVideoTime = video.currentTime;
            const startTimeMs = performance.now();
            const results = faceLandmarker.detectForVideo(video, startTimeMs);

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.faceLandmarks) {
                for (const landmarks of results.faceLandmarks) {
                    // スマホ負荷を考慮し、主要パーツのみ描画
                    // 全体メッシュ
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_TESSELATION, { color: "#C0C0C070", lineWidth: 1 });
                    // 目
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_RIGHT_EYE, { color: "#FF3030" });
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_LEFT_EYE, { color: "#30FF30" });
                    // 唇
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_LIPS, { color: "#E0E0E0" });
                }
            }
        }
        requestAnimationFrame(renderLoop);
    }
</script>
</body>
</html>

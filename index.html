<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>だまし絵マスター - 絶望の難解アート</title>
    <style>
        :root { --primary: #2d3436; --secondary: #636e72; --accent: #d63031; --bg: #dfe6e9; --text: #2d3436; }
        body { font-family: 'Hiragino Maru Gothic ProN', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 500px; background: white; min-height: 100vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.2); }
        .screen { display: none; flex-direction: column; align-items: center; padding: 20px; flex-grow: 1; box-sizing: border-box; width: 100%; overflow-y: auto; }
        .screen.active { display: flex; }
        h1 { color: var(--accent); font-size: 1.8em; margin: 10px 0; letter-spacing: 4px; border-bottom: 4px solid var(--accent); }
        .rule-card { background: #fee; padding: 15px; border-radius: 10px; width: 90%; margin-bottom: 15px; text-align: center; border: 2px dashed var(--accent); color: var(--accent); font-weight: bold; }
        button { background-color: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1em; font-weight: bold; cursor: pointer; margin: 8px; width: 90%; }
        button:active { opacity: 0.8; transform: scale(0.98); }
        input[type="text"] { width: 90%; padding: 12px; font-size: 1.1em; border: 2px solid #ddd; border-radius: 8px; text-align: center; margin-bottom: 10px; box-sizing: border-box; }
        .canvas-container { width: 100%; background: white; border: 5px solid var(--primary); border-radius: 5px; position: relative; aspect-ratio: 1 / 1; touch-action: none; }
        canvas { display: block; width: 100%; height: 100%; }
        .player-item { width: 90%; background: #eee; margin: 4px 0; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; font-size: 0.9em; }
        .timer { color: var(--accent); font-weight: bold; font-size: 1.5em; }
        .result-img { width: 100%; border: 3px solid var(--primary); margin: 10px 0; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-title" class="screen active">
        <h1>DAMASHIE : HELL</h1>
        <div class="rule-card">【難しすぎるほど高得点】<br>誰も当てられなければ描き手の圧勝！</div>
        <input type="text" id="my-name" placeholder="名前を入力" maxlength="10">
        <button onclick="enterCircle()" style="background: var(--accent);">匿名サークルで地獄へ</button>
        <button onclick="joinRoom()" style="background: var(--secondary);">合言葉で地獄へ</button>
        <input type="text" id="join-room-id" placeholder="合言葉" style="width:50%;">
    </div>

    <div id="screen-lobby" class="screen">
        <h2 id="room-display">待合室</h2>
        <div id="lobby-players" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
        <button id="btn-start-game" onclick="startGame()" style="display:none; background: var(--accent);">地獄の開幕</button>
        <p id="wait-msg">主人が始めるのを待て...</p>
    </div>

    <div id="screen-prompt" class="screen">
        <h2 id="round-label">Round 1</h2>
        <div id="drawer-input-area" style="display:none; width:100%; text-align:center;">
            <h3>究極の難問を入力せよ</h3>
            <input type="text" id="custom-prompt" placeholder="例：無意識、虚無、量子力学" maxlength="15">
            <button onclick="confirmPrompt()" style="background:var(--accent);">描画開始</button>
        </div>
        <div id="guesser-wait-area" style="display:none; text-align:center;">
            <p id="current-drawer-name">ーーー</p>
            <p>が無理ゲーを作成中...</p>
        </div>
    </div>

    <div id="screen-drawing" class="screen" style="padding:0;">
        <div style="width:100%; background:var(--primary); color:white; padding:10px; display:flex; justify-content:space-between; box-sizing:border-box;">
            <div id="draw-info">???</div>
            <div class="timer" id="timer-text">60</div>
        </div>
        <div class="canvas-container">
            <canvas id="main-canvas" width="500" height="500"></canvas>
            <div id="blocker" style="position:absolute; top:0; left:0; width:100%; height:100%; display:none;"></div>
        </div>
        <div id="tool-bar" style="display:none; width:100%; padding:10px; justify-content:center; gap:20px; background:#333;">
            <div onclick="setColor('#000')" style="width:40px; height:40px; border-radius:50%; background:#000; border:2px solid #fff;"></div>
            <div onclick="setColor('#fff')" style="width:40px; height:40px; border-radius:50%; background:#fff; border:2px solid #000;"></div>
            <button onclick="clearCanvas()" style="width:auto; padding:5px 15px; margin:0; background:#666;">全消去</button>
        </div>
        <button id="btn-done" onclick="finishDrawing()" style="display:none; background:var(--accent);">描き終えた（絶望を与えろ）</button>
    </div>

    <div id="screen-guessing" class="screen">
        <h2>この怪作を解読せよ</h2>
        <img id="display-img" class="result-img">
        <div id="guess-form" style="width:100%; text-align:center;">
            <input type="text" id="guess-input" placeholder="この概念は何？">
            <button onclick="submitGuess()" style="background:var(--accent);">回答を提出</button>
        </div>
        <div id="guess-wait" style="display:none;"><p>他の犠牲者を待っています...</p></div>
    </div>

    <div id="screen-result" class="screen">
        <h2 id="result-answer" style="color:var(--accent);"></h2>
        <img id="result-img-final" class="result-img">
        <div id="answer-list" style="width:100%; margin:10px 0;"></div>
        <button id="btn-next" onclick="nextRound()" style="display:none; background:var(--accent);">次へ進む</button>
        <p id="host-wait">主人の操作を待て...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, child, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
      apiKey: "AIzaSyACEPLiM3hhj2uQoxg-kJt1RF2zmfE6Uqg",
      authDomain: "basashi-c1588.firebaseapp.com",
      databaseURL: "https://basashi-c1588-default-rtdb.firebaseio.com",
      projectId: "basashi-c1588",
      storageBucket: "basashi-c1588.firebasestorage.app",
      messagingSenderId: "622463342057",
      appId: "1:622463342057:web:c39e37aa232c30187ce778",
      measurementId: "G-S08L2GVZPV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myUid = localStorage.getItem('damashie_uid') || Math.random().toString(36).substring(2, 10);
    localStorage.setItem('damashie_uid', myUid);
    let myName = "", roomId = "", roomRef = null, isHost = false, roomState = {};

    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false, currentColor = '#000';

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    window.enterCircle = () => { roomId = "HELL_CIRCLE"; join(); };
    window.joinRoom = () => { roomId = document.getElementById('join-room-id').value.toUpperCase() || "LOBBY"; join(); };

    async function join() {
        myName = document.getElementById('my-name').value || "亡者";
        roomRef = ref(db, `rooms/${roomId}`);
        const snap = await get(roomRef);
        if (!snap.exists()) {
            isHost = true;
            await set(roomRef, { state: "lobby", hostUid: myUid, players: { [myUid]: { name: myName, score: 0, order: Date.now() } }, round: 1, drawerIndex: 0 });
        } else {
            if (snap.val().banList?.[myUid]) return alert("追放されています");
            await update(child(roomRef, `players/${myUid}`), { name: myName, score: 0, order: Date.now() });
        }
        initListener();
    }

    function initListener() {
        onValue(roomRef, (snap) => {
            const data = snap.val(); if (!data) return;
            roomState = data;
            if (data.banList?.[myUid]) location.reload();

            const keys = Object.keys(data.players || {}).sort((a,b) => data.players[a].order - data.players[b].order);
            const drawerUid = keys[data.drawerIndex];
            const isMeDrawer = (myUid === drawerUid);
            isHost = (data.hostUid === myUid);

            if (data.state === "lobby") {
                switchScreen('screen-lobby');
                document.getElementById('lobby-players').innerHTML = keys.map(k => `<div class="player-item">${data.players[k].name} (${data.players[k].score}点)</div>`).join('');
                document.getElementById('btn-start-game').style.display = isHost ? 'block' : 'none';
                document.getElementById('wait-msg').style.display = isHost ? 'none' : 'block';
            }

            if (data.state === "prompt") {
                switchScreen('screen-prompt');
                if (isMeDrawer) {
                    document.getElementById('drawer-input-area').style.display = 'block';
                    document.getElementById('guesser-wait-area').style.display = 'none';
                } else {
                    document.getElementById('drawer-input-area').style.display = 'none';
                    document.getElementById('guesser-wait-area').style.display = 'block';
                    document.getElementById('current-drawer-name').innerText = data.players[drawerUid]?.name;
                }
            }

            if (data.state === "drawing") {
                switchScreen('screen-drawing');
                document.getElementById('timer-text').innerText = data.timeLeft;
                document.getElementById('draw-info').innerText = isMeDrawer ? `お題: ${data.currentPrompt}` : `${data.players[drawerUid]?.name}が描画中`;
                document.getElementById('tool-bar').style.display = isMeDrawer ? 'flex' : 'none';
                document.getElementById('btn-done').style.display = isMeDrawer ? 'block' : 'none';
                document.getElementById('blocker').style.display = isMeDrawer ? 'none' : 'block';
                if (!isMeDrawer && data.canvasData) {
                    const img = new Image();
                    img.onload = () => { ctx.clearRect(0,0,500,500); ctx.drawImage(img,0,0); };
                    img.src = data.canvasData;
                }
            }

            if (data.state === "guessing") {
                switchScreen('screen-guessing');
                document.getElementById('display-img').src = data.canvasData;
                const isAnswered = data.guesses?.[myUid];
                document.getElementById('guess-form').style.display = (isMeDrawer || isAnswered) ? 'none' : 'block';
                document.getElementById('guess-wait').style.display = (isMeDrawer || isAnswered) ? 'block' : 'none';
                if (isHost && data.guesses && Object.keys(data.guesses).length >= keys.length - 1) calcScore(data, keys, drawerUid);
            }

            if (data.state === "result") {
                switchScreen('screen-result');
                document.getElementById('result-answer').innerText = `正解は「${data.currentPrompt}」でした`;
                document.getElementById('result-img-final').src = data.canvasData;
                const gs = data.guesses || {};
                document.getElementById('answer-list').innerHTML = Object.keys(gs).map(k => `<div class="player-item"><span>${data.players[k].name}: ${gs[k].text}</span><span>${gs[k].correct ? '✅' : '❌'}</span></div>`).join('');
                document.getElementById('btn-next').style.display = isHost ? 'block' : 'none';
            }
        });
    }

    window.startGame = () => update(roomRef, { state: "prompt" });
    window.confirmPrompt = () => {
        const p = document.getElementById('custom-prompt').value.trim();
        if (!p) return;
        update(roomRef, { state: "drawing", currentPrompt: p, timeLeft: 60, guesses: null, canvasData: "" });
        startTimer();
    };

    function startTimer() {
        let t = 60;
        const itv = setInterval(() => {
            if (roomState.state !== "drawing") return clearInterval(itv);
            t--; update(roomRef, { timeLeft: t });
            if (t <= 0) { clearInterval(itv); update(roomRef, { state: "guessing" }); }
        }, 1000);
    }

    window.finishDrawing = () => update(roomRef, { state: "guessing" });
    window.submitGuess = () => {
        const val = document.getElementById('guess-input').value.trim();
        if (!val) return;
        update(child(roomRef, `guesses/${myUid}`), { text: val, correct: (val === roomState.currentPrompt) });
    };

    function calcScore(data, keys, drawerUid) {
        const guesses = data.guesses || {};
        const corrects = Object.values(guesses).filter(g => g.correct).length;
        const totalOpponents = keys.length - 1;
        
        // 【新・地獄ルール】
        // 0人正解：描き手に250点（最強）
        // 1人正解：描き手に100点
        // 全員正解：描き手に0点（わかりやすすぎてゴミ扱い）
        let drawerBonus = 0;
        if (corrects === 0) drawerBonus = 250;
        else if (corrects === 1) drawerBonus = 100;
        else drawerBonus = Math.floor(((totalOpponents - corrects) / totalOpponents) * 50);

        let up = { state: "result" };
        up[`players/${drawerUid}/score`] = (data.players[drawerUid].score || 0) + drawerBonus;

        Object.keys(guesses).forEach(uid => {
            if (guesses[uid].correct) up[`players/${uid}/score`] = (data.players[uid].score || 0) + 100;
        });
        update(roomRef, up);
    }

    window.nextRound = () => {
        const keys = Object.keys(roomState.players).sort((a,b) => roomState.players[a].order - roomState.players[b].order);
        let next = roomState.drawerIndex + 1;
        if (next >= keys.length) update(roomRef, { state: "lobby", drawerIndex: 0, round: 1, guesses: null });
        else update(roomRef, { state: "prompt", drawerIndex: next, round: roomState.round + 1, guesses: null });
    };

    // お絵かき同期
    const getPos = (e) => {
        const r = canvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
        return { x: x * (canvas.width / r.width), y: y * (canvas.height / r.height) };
    };
    const sync = () => { if (myUid === Object.keys(roomState.players).sort((a,b)=>roomState.players[a].order-roomState.players[b].order)[roomState.drawerIndex]) update(roomRef, { canvasData: canvas.toDataURL('image/jpeg', 0.5) }); };
    canvas.addEventListener('mousedown', (e) => { isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    window.addEventListener('mousemove', (e) => { if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.strokeStyle = currentColor; ctx.lineWidth = 5; ctx.stroke(); if(Math.random()>0.8) sync(); });
    window.addEventListener('mouseup', () => { if (isDrawing) { isDrawing = false; sync(); } });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    window.addEventListener('touchmove', (e) => { if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.strokeStyle = currentColor; ctx.lineWidth = 5; ctx.stroke(); sync(); }, { passive: false });
    window.addEventListener('touchend', () => { if (isDrawing) { isDrawing = false; sync(); } });
    window.setColor = (c) => currentColor = c;
    window.clearCanvas = () => { ctx.fillStyle = "#fff"; ctx.fillRect(0,0,500,500); sync(); };
</script>
</body>
</html>

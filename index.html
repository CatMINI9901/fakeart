<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>だまし絵マスター - 匿名サークル版</title>
    <style>
        :root { --primary: #FF6B6B; --secondary: #4ECDC4; --accent: #FFE66D; --dark: #2C3E50; --light: #F7FFF7; --bg: #E8F8F5; }
        body { font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'Meiryo', sans-serif; background-color: var(--bg); color: var(--dark); margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 600px; background: var(--light); min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; position: relative; }
        .screen { display: none; flex-direction: column; align-items: center; padding: 30px 20px; flex-grow: 1; animation: fadeIn 0.3s ease-out; box-sizing: border-box; width: 100%; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h1 { color: var(--primary); font-size: 2em; text-align: center; text-shadow: 2px 2px 0px var(--accent); margin-bottom: 10px; }
        h2 { color: var(--secondary); font-size: 1.4em; margin-bottom: 15px; text-align: center; }
        button { background-color: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 30px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: all 0.1s; box-shadow: 0 6px 0 #C0392B; margin: 10px; width: 80%; max-width: 300px; }
        button:hover { transform: translateY(2px); box-shadow: 0 4px 0 #C0392B; }
        button:active { transform: translateY(6px); box-shadow: 0 0 0 #C0392B; }
        .btn-ban { background: #e74c3c; box-shadow: 0 3px 0 #c0392b; font-size: 0.7em; padding: 5px 10px; width: auto; margin-left: 10px; }
        input[type="text"] { width: 80%; max-width: 300px; padding: 12px; font-size: 1.1em; border: 3px solid #ddd; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        .canvas-container { width: 100%; background: white; border: 4px solid var(--dark); border-radius: 15px; overflow: hidden; margin-bottom: 10px; touch-action: none; position: relative; aspect-ratio: 4 / 3; }
        canvas { display: block; width: 100%; height: 100%; background-color: #ffffff; }
        #canvas-blocker { position: absolute; top:0; left:0; right:0; bottom:0; z-index: 10; display: none; }
        .player-list { width: 100%; list-style: none; padding: 0; text-align: center; }
        .player-item { display: flex; align-items: center; justify-content: center; background: #fff; margin: 5px; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        .status-bar { width: 100%; background: var(--dark); color: white; padding: 10px; display: flex; justify-content: space-between; box-sizing: border-box; font-size: 0.9em; }
        .result-image { width: 100%; max-width: 400px; border: 4px solid var(--dark); border-radius: 10px; background: white; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-title" class="screen active">
        <h1>だまし絵マスター</h1>
        <input type="text" id="my-name" placeholder="なまえを入力" maxlength="10">
        <button onclick="enterCircle()" style="background-color: var(--accent); color: var(--dark); box-shadow: 0 6px 0 #D4AC0D;">匿名サークルに入る</button>
        <div style="margin: 10px 0; color: #999;">または</div>
        <input type="text" id="join-room-id" placeholder="合言葉を入力" style="text-transform: uppercase;">
        <button onclick="joinRoom()" style="background-color: var(--secondary); box-shadow: 0 6px 0 #16A085;">部屋に入る</button>
        <button onclick="createRoom()" style="background-color: #999; font-size: 0.8em; box-shadow: 0 4px 0 #666;">（新規ホストで部屋を作る）</button>
    </div>

    <div id="screen-lobby" class="screen">
        <h2 id="lobby-title">待合室</h2>
        <ul class="player-list" id="lobby-players"></ul>
        <button id="btn-start-game" onclick="startGame()" style="display: none;">ゲーム開始</button>
        <p id="waiting-host-msg">ホストの開始を待っています...</p>
        <button onclick="location.reload()" style="background: #999; width: auto; font-size: 0.8em;">退出する</button>
    </div>

    <div id="screen-prompt" class="screen">
        <h2 id="round-info">Round 1</h2>
        <h3 id="turn-player-name">---</h3>
        <div id="drawer-prompt-view" style="display: none; text-align: center;">
            <p>あなたへのお題：</p>
            <div id="secret-prompt" style="font-size: 2em; font-weight: bold; background: var(--accent); padding: 10px; border-radius: 10px;"></div>
            <button onclick="advanceState('drawing')" id="btn-start-drawing" style="display: none; margin-top: 20px;">描きはじめる</button>
        </div>
        <div id="guesser-prompt-view" style="display: none;"><p>描き手がお題を確認中...</p></div>
    </div>

    <div id="screen-drawing" class="screen" style="padding: 0;">
        <div class="status-bar"><div id="drawing-status-text">待機中...</div><div class="timer" id="drawing-timer" style="color:var(--accent); font-weight:bold;">60</div></div>
        <div class="canvas-container"><canvas id="drawing-canvas" width="600" height="450"></canvas><div id="canvas-blocker"></div></div>
        <div id="drawing-tools" style="display:none; gap:10px; margin-bottom:10px;">
            <button onclick="setColor('#000')" style="width:30px; height:30px; border-radius:50%; background:#000; padding:0;"></button>
            <button onclick="setColor('#f00')" style="width:30px; height:30px; border-radius:50%; background:#f00; padding:0;"></button>
            <button onclick="clearCanvas()" style="width:auto; padding: 5px 15px; font-size:0.8em;">消去</button>
        </div>
        <button id="btn-finish-drawing" onclick="finishDrawing()" style="display: none;">描けた！</button>
    </div>

    <div id="screen-guessing" class="screen">
        <h2>これ、なーんだ？</h2>
        <img id="guess-image-display" class="result-image" src="">
        <div id="guess-input-area" style="width: 100%; text-align: center; margin-top: 15px;">
            <input type="text" id="guess-input" placeholder="答えを入力">
            <button onclick="submitGuess()">回答送信</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h2>正解は「<span id="result-prompt"></span>」</h2>
        <img id="result-image-display-2" class="result-image" src="">
        <div id="answers-log" style="width: 100%; margin: 15px 0; background: #fff; border-radius: 10px; padding: 10px; box-sizing: border-box;">
            <ul id="answers-list" style="list-style: none; padding: 0; margin: 0; text-align: left;"></ul>
        </div>
        <button id="btn-next-round" onclick="nextRound()" style="display: none;">次のラウンド</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, child, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
      apiKey: "AIzaSyACEPLiM3hhj2uQoxg-kJt1RF2zmfE6Uqg",
      authDomain: "basashi-c1588.firebaseapp.com",
      databaseURL: "https://basashi-c1588-default-rtdb.firebaseio.com",
      projectId: "basashi-c1588",
      storageBucket: "basashi-c1588.firebasestorage.app",
      messagingSenderId: "622463342057",
      appId: "1:622463342057:web:c39e37aa232c30187ce778",
      measurementId: "G-S08L2GVZPV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myUid = localStorage.getItem('myUid') || Math.random().toString(36).substring(2, 10);
    localStorage.setItem('myUid', myUid);
    let myName = "", roomId = "", isHost = false, roomRef = null, roomState = {};
    const PROMPT_LIST = ["ねこ", "かさ", "ピザ", "かき氷", "パンダ", "ロケット", "ピアノ", "りんご", "めがね", "ひまわり"];

    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false, currentColor = '#000';

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- 匿名サークル機能 ---
    window.enterCircle = async () => {
        // 固定の部屋ID「PUBLIC」を使用
        roomId = "PUBLIC";
        roomRef = ref(db, `rooms/${roomId}`);
        const snap = await get(roomRef);
        
        if (!snap.exists()) {
            // まだサークルがなければホストとして作成
            createRoom("PUBLIC");
        } else {
            // 既にサークルがあれば参加
            joinRoom("PUBLIC");
        }
    };

    window.createRoom = async (specificId) => {
        myName = document.getElementById('my-name').value || "ゲスト";
        roomId = specificId || Math.random().toString(36).substring(2, 6).toUpperCase();
        isHost = true;
        roomRef = ref(db, `rooms/${roomId}`);
        await set(roomRef, {
            state: "lobby", hostUid: myUid, round: 1, drawerIndex: 0,
            players: { [myUid]: { name: myName, score: 0, order: Date.now() } }
        });
        initListener();
        switchScreen('screen-lobby');
    };

    window.joinRoom = async (specificId) => {
        myName = document.getElementById('my-name').value || "ゲスト";
        roomId = specificId || document.getElementById('join-room-id').value.toUpperCase();
        roomRef = ref(db, `rooms/${roomId}`);
        const snap = await get(roomRef);
        if (!snap.exists()) return alert("部屋がないよ");

        // BANチェック
        if (snap.val().banList && snap.val().banList[myUid]) {
            return alert("このサークルからはBANされています。");
        }

        await update(child(roomRef, 'players'), { [myUid]: { name: myName, score: 0, order: Date.now() } });
        initListener();
        switchScreen('screen-lobby');
    };

    // BAN機能
    window.banPlayer = (uid) => {
        if (!isHost) return;
        if (uid === myUid) return alert("自分はBANできません");
        if (confirm("このプレイヤーをBANしますか？")) {
            update(child(roomRef, 'banList'), { [uid]: true });
            remove(child(roomRef, `players/${uid}`));
        }
    };

    function initListener() {
        onValue(roomRef, (snap) => {
            const data = snap.val(); if (!data) return;
            roomState = data;
            
            // BANされたら強制退出
            if (data.banList && data.banList[myUid]) {
                alert("BANされました。");
                location.reload();
            }

            const playerKeys = Object.keys(data.players || {}).sort((a,b) => data.players[a].order - data.players[b].order);
            if (!data.players[myUid] && data.state !== "lobby") return; // 自分が消えたら終了

            const currentDrawerUid = playerKeys[data.drawerIndex];
            const isMeDrawer = (myUid === currentDrawerUid);
            isHost = (data.hostUid === myUid);

            if (data.state === "lobby") {
                switchScreen('screen-lobby');
                document.getElementById('lobby-title').innerText = (roomId === "PUBLIC") ? "匿名サークル" : `部屋: ${roomId}`;
                document.getElementById('lobby-players').innerHTML = playerKeys.map(k => {
                    const banBtn = (isHost && k !== myUid) ? `<button class="btn-ban" onclick="banPlayer('${k}')">BAN</button>` : "";
                    return `<li class="player-item">${data.players[k].name}${banBtn}</li>`;
                }).join('');
                document.getElementById('btn-start-game').style.display = isHost ? 'block' : 'none';
                document.getElementById('waiting-host-msg').style.display = isHost ? 'none' : 'block';
            }
            
            // 以降、お絵かき等の状態遷移（前回の修正を統合）
            if (data.state === "prompt") {
                switchScreen('screen-prompt');
                document.getElementById('turn-player-name').innerText = `${data.players[currentDrawerUid]?.name}さんの番`;
                if (isMeDrawer) {
                    document.getElementById('drawer-prompt-view').style.display = 'block';
                    document.getElementById('secret-prompt').innerText = data.currentPrompt;
                    document.getElementById('btn-start-drawing').style.display = 'inline-block';
                } else {
                    document.getElementById('drawer-prompt-view').style.display = 'none';
                }
            }

            if (data.state === "drawing") {
                switchScreen('screen-drawing');
                document.getElementById('drawing-timer').innerText = data.timeLeft;
                if (!isMeDrawer && data.canvasData) {
                    const img = new Image();
                    img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
                    img.src = data.canvasData;
                }
                document.getElementById('drawing-tools').style.display = isMeDrawer ? 'flex' : 'none';
                document.getElementById('btn-finish-drawing').style.display = isMeDrawer ? 'block' : 'none';
                document.getElementById('canvas-blocker').style.display = isMeDrawer ? 'none' : 'block';
            }

            if (data.state === "result") {
                switchScreen('screen-result');
                document.getElementById('result-prompt').innerText = data.currentPrompt;
                document.getElementById('result-image-display-2').src = data.canvasData;
                const guesses = data.guesses || {};
                document.getElementById('answers-list').innerHTML = Object.keys(guesses).map(uid => {
                    return `<li>${data.players[uid]?.name || "？"}: ${guesses[uid].text} ${guesses[uid].correct ? "✅" : "❌"}</li>`;
                }).join('');
                document.getElementById('btn-next-round').style.display = isHost ? 'block' : 'none';
            }
        });
    }

    // 進行ロジック
    window.startGame = () => update(roomRef, { state: "prompt", currentPrompt: PROMPT_LIST[Math.floor(Math.random()*PROMPT_LIST.length)] });
    window.advanceState = (s) => {
        update(roomRef, { state: s });
        if (s === "drawing") {
            ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, canvas.width, canvas.height); syncCanvas();
            let t = 60;
            const timer = setInterval(() => {
                if (roomState.state !== "drawing") { clearInterval(timer); return; }
                t--; update(roomRef, { timeLeft: t });
                if (t <= 0) { clearInterval(timer); update(roomRef, { state: "guessing" }); }
            }, 1000);
        }
    };
    window.finishDrawing = () => update(roomRef, { state: "guessing" });
    window.submitGuess = () => {
        const val = document.getElementById('guess-input').value.trim();
        update(child(roomRef, `guesses/${myUid}`), { text: val, correct: (val === roomState.currentPrompt) });
        document.getElementById('guess-input').value = "";
    };
    window.nextRound = () => {
        const keys = Object.keys(roomState.players);
        let next = roomState.drawerIndex + 1;
        if (next >= keys.length) update(roomRef, { state: "lobby", round: 1, drawerIndex: 0, guesses: null, canvasData: "" });
        else update(roomRef, { state: "prompt", drawerIndex: next, round: roomState.round + 1, currentPrompt: PROMPT_LIST[Math.floor(Math.random()*PROMPT_LIST.length)], guesses: null, canvasData: "" });
    };

    // お絵かき同期系
    function syncCanvas() { if (roomState.state === "drawing") update(roomRef, { canvasData: canvas.toDataURL('image/jpeg', 0.5) }); }
    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (x - r.left) * (canvas.width / r.width), y: (y - r.top) * (canvas.height / r.height) };
    }
    canvas.addEventListener('mousedown', (e) => {
        if (roomState.state !== "drawing" || roomState.drawerIndex !== Object.keys(roomState.players).sort((a,b)=>roomState.players[a].order-roomState.players[b].order).indexOf(myUid)) return;
        isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y);
    });
    window.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.strokeStyle = currentColor; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.stroke();
        if (Math.random() > 0.8) syncCanvas();
    });
    window.addEventListener('mouseup', () => { if(isDrawing){ isDrawing = false; syncCanvas(); } });
    window.setColor = (c) => currentColor = c;
    window.clearCanvas = () => { ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, canvas.width, canvas.height); syncCanvas(); };
</script>
</body>
</html>

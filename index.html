<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaPipe Face Landmarker Demo</title>
    <style>
        body {
            font-family: helvetica, arial, sans-serif;
            margin: 2em;
            color: #3d3d3d;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: #333; }

        .container {
            position: relative;
            margin-top: 1em;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
            width: 640px;
            height: 480px;
            background-color: #000;
        }

        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
        }

        /* ビデオを左右反転させる（鏡のように） */
        video#webcam, canvas#output_canvas {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
            -moz-transform: rotateY(180deg);
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-bottom: 20px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.2s;
        }

        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        #status {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>MediaPipe 顔トラッキング (Web版)</h1>
    <p>ブラウザでリアルタイムに顔をトラッキングします。</p>
    
    <button id="webcamButton">カメラを起動</button>
    
    <div class="container">
        <!-- カメラ映像を表示するビデオ要素 -->
        <video id="webcam" autoplay playsinline></video>
        <!-- トラッキング結果を描画するキャンバス要素 -->
        <canvas id="output_canvas"></canvas>
    </div>
    
    <div id="status"></div>

    <!-- MediaPipeの必要なライブラリをCDNから読み込む -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js" crossorigin="anonymous"></script>

    <script type="module">
        import { FaceLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

        // HTML要素の取得
        const video = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const webcamButton = document.getElementById('webcamButton');
        const statusDisplay = document.getElementById('status');

        let faceLandmarker = undefined;
        let runningMode = "VIDEO"; // ビデオモードで実行
        let webcamRunning = false;
        const videoWidth = 640;
        const videoHeight = 480;

        // 1. Face Landmarkerを初期化する関数
        async function createFaceLandmarker() {
            statusDisplay.innerText = "モデルをロード中...";
            
            // WASMファイルをロード
            const filesetResolver = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
            );
            
            // Face Landmarkerのインスタンスを作成
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: {
                    // 学習済みモデル（.taskファイル）を指定
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                    delegate: "GPU" // 高速化のためGPUを使用
                },
                outputFaceBlendshapes: false, // 表情データは今回オフ
                runningMode: runningMode,
                numFaces: 1 // 同時にトラッキングする顔の数
            });
            
            statusDisplay.innerText = "モデルのロードが完了しました。";
            webcamButton.disabled = false;
        }

        // 初期化を実行
        createFaceLandmarker();

        // 2. カメラを起動し、トラッキングを開始する関数
        async function enableCam() {
            if (!faceLandmarker) {
                console.log("Face Landmarkerがまだロードされていません。");
                return;
            }

            if (webcamRunning === true) {
                webcamRunning = false;
                webcamButton.innerText = "トラッキングを開始";
            } else {
                webcamRunning = true;
                webcamButton.innerText = "トラッキングを停止";
            }

            // カメラアクセスの設定
            const constraints = {
                video: {
                    width: videoWidth,
                    height: videoHeight
                }
            };

            // ユーザーのカメラにアクセス
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                // ビデオが読み込まれたらトラッキングを開始
                video.addEventListener('loadeddata', () => {
                    // キャンバスのサイズをビデオに合わせる
                    canvasElement.width = video.videoWidth;
                    canvasElement.height = video.videoHeight;
                    // トラッキングループを開始
                    predictWebcam();
                });
            } catch (err) {
                console.error("カメラへのアクセスに失敗しました:", err);
                statusDisplay.innerText = "カメラエラー: " + err.message;
            }
        }

        // ボタンにイベントリスナーを追加
        webcamButton.addEventListener('click', enableCam);

        let lastVideoTime = -1;
        const drawingUtils = new DrawingUtils(canvasCtx);

        // 3. メインのトラッキングループ（フレームごとの処理）
        async function predictWebcam() {
            // トラッキングが停止していればループを抜ける
            if (!webcamRunning) {
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                return;
            }

            // ビデオが再生中で、かつ新しいフレームがある場合のみ処理
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                
                // 現在の時間（ミリ秒）
                const startTimeMs = performance.now();
                
                // --- トラッキングを実行 ---
                const results = faceLandmarker.detectForVideo(video, startTimeMs);

                // --- 描画処理 ---
                // キャンバスをクリア
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                // 顔が検出された場合
                if (results.faceLandmarks) {
                    for (const landmarks of results.faceLandmarks) {
                        // 全体のメッシュを描画
                        drawingUtils.drawConnectors(
                            landmarks,
                            FaceLandmarker.FACE_LANDMARKS_TESSELATION,
                            { color: "#C0C0C070", lineWidth: 1 }
                        );
                        // 右目を描画
                        drawingUtils.drawConnectors(
                            landmarks,
                            FaceLandmarker.FACE_LANDMARKS_RIGHT_EYE,
                            { color: "#FF3030" }
                        );
                        // 右眉を描画
                        drawingUtils.drawConnectors(
                            landmarks,
                            FaceLandmarker.FACE_LANDMARKS_RIGHT_EYEBROW,
                            { color: "#FF3030" }
                        );
                        // 左目を描画
                        drawingUtils.drawConnectors(
                            landmarks,
                            FaceLandmarker.FACE_LANDMARKS_LEFT_EYE,
                            { color: "#30FF30" }
                        );
                        // 左眉を描画
                        drawingUtils.drawConnectors(
                            landmarks,
                            FaceLandmarker.FACE_LANDMARKS_LEFT_EYEBROW,
                            { color: "#30FF30" }
                        );
                        // 輪郭を描画
                        drawingUtils.drawConnectors(
                            landmarks,
                            FaceLandmarker.FACE_LANDMARKS_FACE_OVAL,
                            { color: "#E0E0E0" }
                        );
                        // 唇を描画
                        drawingUtils.drawConnectors(
                            landmarks,
                            FaceLandmarker.FACE_LANDMARKS_LIPS,
                            { color: "#E0E0E0" }
                        );
                    }
                }
            }

            // 次のフレームで再び呼び出す（ループ）
            requestAnimationFrame(predictWebcam);
        }
    </script>
</body>
</html>

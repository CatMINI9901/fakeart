<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>だまし絵マスター - オンライン完全版</title>
    <style>
        :root { --primary: #FF6B6B; --secondary: #4ECDC4; --accent: #FFE66D; --dark: #2C3E50; --light: #F7FFF7; --bg: #E8F8F5; }
        body { font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'Meiryo', sans-serif; background-color: var(--bg); color: var(--dark); margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 600px; background: var(--light); min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; position: relative; }
        .screen { display: none; flex-direction: column; align-items: center; padding: 30px 20px; flex-grow: 1; animation: fadeIn 0.3s ease-out; box-sizing: border-box; width: 100%; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h1 { color: var(--primary); font-size: 2em; text-align: center; text-shadow: 2px 2px 0px var(--accent); margin-bottom: 10px; }
        h2 { color: var(--secondary); font-size: 1.4em; margin-bottom: 15px; text-align: center; }
        button { background-color: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 30px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: all 0.1s; box-shadow: 0 6px 0 #C0392B; margin: 10px; width: 80%; max-width: 300px; }
        button:hover { transform: translateY(2px); box-shadow: 0 4px 0 #C0392B; }
        button:active { transform: translateY(6px); box-shadow: 0 0 0 #C0392B; }
        input[type="text"] { width: 80%; max-width: 300px; padding: 12px; font-size: 1.1em; border: 3px solid #ddd; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        .canvas-container { width: 100%; background: white; border: 4px solid var(--dark); border-radius: 15px; overflow: hidden; margin-bottom: 10px; touch-action: none; position: relative; aspect-ratio: 4 / 3; }
        canvas { display: block; width: 100%; height: 100%; background-color: #ffffff; }
        #canvas-blocker { position: absolute; top:0; left:0; right:0; bottom:0; z-index: 10; display: none; }
        .tools { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 10px; }
        .color-btn { width: 30px; height: 30px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; }
        .color-btn.selected { border-color: var(--dark); transform: scale(1.1); }
        .status-bar { width: 100%; background: var(--dark); color: white; padding: 10px; display: flex; justify-content: space-between; box-sizing: border-box; font-size: 0.9em; }
        .timer { font-size: 1.2em; color: var(--accent); font-weight: bold; }
        .room-info { background: #eee; padding: 10px; border-radius: 10px; margin: 10px 0; font-weight: bold; font-size: 1.2em; }
        .player-list { width: 100%; list-style: none; padding: 0; text-align: center; }
        .result-image { width: 100%; max-width: 400px; border: 4px solid var(--dark); border-radius: 10px; background: white; }
        .score-board { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .score-board td { padding: 8px; border-bottom: 1px solid #ddd; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-title" class="screen active">
        <h1>だまし絵マスター</h1>
        <input type="text" id="my-name" placeholder="なまえを入力" maxlength="10">
        <button onclick="createRoom()">部屋を作る</button>
        <div style="margin: 10px 0; color: #999;">または</div>
        <input type="text" id="join-room-id" placeholder="合言葉を入力" style="text-transform: uppercase;">
        <button onclick="joinRoom()" style="background-color: var(--secondary); box-shadow: 0 6px 0 #16A085;">部屋に入る</button>
    </div>

    <div id="screen-lobby" class="screen">
        <h2>合言葉: <span id="display-room-id" style="color: var(--primary);">----</span></h2>
        <p>友達にこの合言葉を教えてね</p>
        <ul class="player-list" id="lobby-players"></ul>
        <button id="btn-start-game" onclick="startGame()" style="display: none;">全員揃った！開始</button>
        <p id="waiting-host-msg">ホストの開始を待っています...</p>
    </div>

    <div id="screen-prompt" class="screen">
        <h2 id="round-info">Round 1</h2>
        <h3 id="turn-player-name">---</h3>
        <div id="drawer-prompt-view" style="display: none; text-align: center;">
            <p>あなたへのお題：</p>
            <div id="secret-prompt" style="font-size: 2em; font-weight: bold; background: var(--accent); padding: 10px; border-radius: 10px;"></div>
            <button onclick="hostAdvanceState('drawing')" id="btn-start-drawing" style="display: none; margin-top: 20px;">描きはじめる</button>
        </div>
        <div id="guesser-prompt-view" style="display: none;">
            <p>描き手がお題を確認しています...</p>
        </div>
    </div>

    <div id="screen-drawing" class="screen" style="padding: 0;">
        <div class="status-bar">
            <div id="drawing-status-text">待機中...</div>
            <div class="timer" id="drawing-timer">60</div>
        </div>
        <div class="canvas-container">
            <canvas id="drawing-canvas" width="600" height="450"></canvas>
            <div id="canvas-blocker"></div>
        </div>
        <div id="drawing-tools" class="tools" style="display: none;">
            <div class="color-btn selected" style="background: #000;" onclick="setColor('#000', this)"></div>
            <div class="color-btn" style="background: #f00;" onclick="setColor('#f00', this)"></div>
            <div class="color-btn" style="background: #00f;" onclick="setColor('#00f', this)"></div>
            <button onclick="clearCanvas()" style="width:auto; padding: 5px 15px; margin:0;">消去</button>
        </div>
        <button id="btn-finish-drawing" onclick="finishDrawing()" style="display: none;">描けた！(次へ)</button>
    </div>

    <div id="screen-guessing" class="screen">
        <h2>これ、なーんだ？</h2>
        <img id="guess-image-display" class="result-image" src="">
        <div id="guess-input-area" style="width: 100%; text-align: center; margin-top: 15px;">
            <input type="text" id="guess-input" placeholder="答えを入力">
            <button onclick="submitGuess()">回答送信</button>
        </div>
        <div id="guess-wait-area" style="display: none;"><p>他の人の回答を待っています...</p></div>
    </div>

    <div id="screen-result" class="screen">
        <h2>正解は「<span id="result-prompt"></span>」</h2>
        <img id="result-image-display-2" class="result-image" src="">
        <div id="drawer-points-text" style="margin: 10px 0; font-weight: bold;"></div>
        <button id="btn-next-round" onclick="nextRound()" style="display: none;">次のラウンド</button>
        <p id="wait-next-msg">ホストの操作を待っています...</p>
    </div>

    <div id="screen-final" class="screen">
        <h1>最終スコア</h1>
        <table class="score-board" id="final-score-board"><tbody></tbody></table>
        <button onclick="location.reload()">もう一度あそぶ</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // --- 【重要】Firebase設定 ---
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
      apiKey: "AIzaSyACEPLiM3hhj2uQoxg-kJt1RF2zmfE6Uqg",
      authDomain: "basashi-c1588.firebaseapp.com",
      projectId: "basashi-c1588",
      storageBucket: "basashi-c1588.firebasestorage.app",
      messagingSenderId: "622463342057",
      appId: "1:622463342057:web:c39e37aa232c30187ce778",
      measurementId: "G-S08L2GVZPV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myUid = Math.random().toString(36).substring(2, 10);
    let myName = "", roomId = "", isHost = false, roomRef = null, roomState = {};
    const PROMPT_LIST = ["ねこ", "かさ", "ピザ", "かき氷", "すべり台", "にわとり", "ドーナツ", "めがね", "ひまわり", "ロケット"];

    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false, currentColor = '#000';

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // 1. 部屋作成・参加
    window.createRoom = async () => {
        myName = document.getElementById('my-name').value || "プレイヤー";
        roomId = Math.random().toString(36).substring(2, 6).toUpperCase();
        isHost = true;
        roomRef = ref(db, `rooms/${roomId}`);
        await set(roomRef, {
            state: "lobby", hostUid: myUid, round: 1, drawerIndex: 0,
            players: { [myUid]: { name: myName, score: 0, order: 0 } }
        });
        initListener();
        switchScreen('screen-lobby');
    };

    window.joinRoom = async () => {
        myName = document.getElementById('my-name').value || "プレイヤー";
        roomId = document.getElementById('join-room-id').value.toUpperCase();
        roomRef = ref(db, `rooms/${roomId}`);
        const snap = await get(roomRef);
        if (!snap.exists()) return alert("部屋がないよ");
        const order = Object.keys(snap.val().players).length;
        await update(child(roomRef, 'players'), { [myUid]: { name: myName, score: 0, order: order } });
        initListener();
        switchScreen('screen-lobby');
    };

    function initListener() {
        onValue(roomRef, (snap) => {
            const data = snap.val(); if (!data) return;
            roomState = data;
            const playerKeys = Object.keys(data.players).sort((a,b) => data.players[a].order - data.players[b].order);
            const currentDrawerUid = playerKeys[data.drawerIndex];
            const isMeDrawer = (myUid === currentDrawerUid);

            // 状態に応じたUI表示
            if (data.state === "lobby") {
                document.getElementById('display-room-id').innerText = roomId;
                document.getElementById('lobby-players').innerHTML = playerKeys.map(k => `<li>${data.players[k].name}</li>`).join('');
                if (isHost) document.getElementById('btn-start-game').style.display = 'block';
            }
            if (data.state === "prompt") {
                switchScreen('screen-prompt');
                document.getElementById('turn-player-name').innerText = `${data.players[currentDrawerUid].name}さんの番`;
                if (isMeDrawer) {
                    document.getElementById('drawer-prompt-view').style.display = 'block';
                    document.getElementById('guesser-prompt-view').style.display = 'none';
                    document.getElementById('secret-prompt').innerText = data.currentPrompt;
                    if (isHost) document.getElementById('btn-start-drawing').style.display = 'inline-block';
                } else {
                    document.getElementById('drawer-prompt-view').style.display = 'none';
                    document.getElementById('guesser-prompt-view').style.display = 'block';
                }
            }
            if (data.state === "drawing") {
                switchScreen('screen-drawing');
                document.getElementById('drawing-timer').innerText = data.timeLeft;
                if (isMeDrawer) {
                    document.getElementById('drawing-tools').style.display = 'flex';
                    document.getElementById('btn-finish-drawing').style.display = 'block';
                    document.getElementById('canvas-blocker').style.display = 'none';
                    document.getElementById('drawing-status-text').innerText = `お題: ${data.currentPrompt}`;
                } else {
                    document.getElementById('drawing-tools').style.display = 'none';
                    document.getElementById('btn-finish-drawing').style.display = 'none';
                    document.getElementById('canvas-blocker').style.display = 'block';
                    document.getElementById('drawing-status-text').innerText = `${data.players[currentDrawerUid].name}が描いています...`;
                    if (data.canvasData) {
                        const img = new Image();
                        img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
                        img.src = data.canvasData;
                    }
                }
            }
            if (data.state === "guessing") {
                switchScreen('screen-guessing');
                document.getElementById('guess-image-display').src = data.canvasData;
                if (isMeDrawer || (data.guesses && data.guesses[myUid])) {
                    document.getElementById('guess-input-area').style.display = 'none';
                    document.getElementById('guess-wait-area').style.display = 'block';
                } else {
                    document.getElementById('guess-input-area').style.display = 'block';
                    document.getElementById('guess-wait-area').style.display = 'none';
                }
                if (isHost && data.guesses && Object.keys(data.guesses).length >= playerKeys.length - 1) {
                    calcResult(data, playerKeys, currentDrawerUid);
                }
            }
            if (data.state === "result") {
                switchScreen('screen-result');
                document.getElementById('result-prompt').innerText = data.currentPrompt;
                document.getElementById('result-image-display-2').src = data.canvasData;
                if (isHost) document.getElementById('btn-next-round').style.display = 'block';
            }
            if (data.state === "final") {
                switchScreen('screen-final');
                const sorted = playerKeys.sort((a,b) => data.players[b].score - data.players[a].score);
                document.querySelector('#final-score-board tbody').innerHTML = sorted.map((k, i) => `<tr><td>${i+1}位</td><td>${data.players[k].name}</td><td>${data.players[k].score}点</td></tr>`).join('');
            }
        });
    }

    // ゲーム進行
    window.startGame = () => update(roomRef, { state: "prompt", currentPrompt: PROMPT_LIST[Math.floor(Math.random()*PROMPT_LIST.length)] });
    
    window.hostAdvanceState = (s) => {
        update(roomRef, { state: s });
        if (s === "drawing") {
            // 開始時にキャンバスを白く塗る
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            syncCanvas();
            let t = 60;
            const timer = setInterval(() => {
                t--; update(roomRef, { timeLeft: t });
                if (t <= 0) { clearInterval(timer); update(roomRef, { state: "guessing" }); }
            }, 1000);
            window.currentTimer = timer;
        }
    };

    window.finishDrawing = () => { if(window.currentTimer) clearInterval(window.currentTimer); update(roomRef, { state: "guessing" }); };

    window.submitGuess = () => {
        const val = document.getElementById('guess-input').value;
        update(child(roomRef, `guesses/${myUid}`), { text: val, correct: (val === roomState.currentPrompt) });
        document.getElementById('guess-input').value = "";
    };

    async function calcResult(data, keys, drawerUid) {
        const guesses = data.guesses || {};
        const corrects = Object.values(guesses).filter(g => g.correct).length;
        let up = { state: "result" };
        for (let k in guesses) if(guesses[k].correct) up[`players/${k}/score`] = data.players[k].score + 100;
        let dPts = 100;
        if (corrects === 0) dPts = 80;
        else if (corrects === keys.length - 1) dPts = 30;
        else if (corrects === 1) dPts = 200;
        up[`players/${drawerUid}/score`] = data.players[drawerUid].score + dPts;
        update(roomRef, up);
    }

    window.nextRound = () => {
        const keys = Object.keys(roomState.players);
        let next = roomState.drawerIndex + 1;
        if (next >= keys.length) update(roomRef, { state: "final" });
        else update(roomRef, { state: "prompt", drawerIndex: next, round: roomState.round + 1, currentPrompt: PROMPT_LIST[Math.floor(Math.random()*PROMPT_LIST.length)], guesses: null, canvasData: "" });
    };

    // お絵かき同期
    function syncCanvas() {
        if (roomRef && roomState.state === "drawing") {
            update(roomRef, { canvasData: canvas.toDataURL('image/jpeg', 0.5) });
        }
    }

    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (x - r.left) * (canvas.width / r.width), y: (y - r.top) * (canvas.height / r.height) };
    }

    function startDraw(e) {
        const keys = Object.keys(roomState.players).sort((a,b) => roomState.players[a].order - roomState.players[b].order);
        if (myUid !== keys[roomState.drawerIndex]) return;
        isDrawing = true; const p = getPos(e);
        ctx.beginPath(); ctx.moveTo(p.x, p.y);
        ctx.strokeStyle = currentColor; ctx.lineWidth = 5; ctx.lineCap = 'round';
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
    window.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
        if (Math.random() > 0.8) syncCanvas();
    });
    window.addEventListener('touchmove', (e) => {
        if (!isDrawing) return;
        const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
        if (Math.random() > 0.8) syncCanvas();
    }, {passive: false});
    window.addEventListener('mouseup', () => { if(isDrawing){ isDrawing = false; syncCanvas(); } });
    window.addEventListener('touchend', () => { if(isDrawing){ isDrawing = false; syncCanvas(); } });

    window.setColor = (c, el) => { currentColor = c; document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); };
    window.clearCanvas = () => { ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, canvas.width, canvas.height); syncCanvas(); };
</script>
</body>
</html>
